services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    # Host-bind for the panel HTTP port. Defaults to 127.0.0.1 so a fresh
    # clone is safe for local dev. In production, override HOST_BIND_IP
    # with the interface your reverse proxy reaches the container on.
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8003:8000"
    volumes:
      # rw so the panel can `docker start/stop/exec` and attach container
      # networks for the RCON console.
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # rw so the panel can scaffold compose + start_server.sh and let
      # operators edit files via the in-app file browser.
      - ${SERVER_BASE_PATH}:${SERVER_BASE_PATH}:rw
