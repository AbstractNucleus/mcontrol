services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    # Host-bind for the panel HTTP port. Default 127.0.0.1 keeps a fresh clone
    # safe for local dev; bserver overrides BSERVER_HOST_BIND_IP to its tailnet
    # IP per decision 003, so aserver-nginx (decision 019) can proxy_pass to it.
    ports:
      - "${BSERVER_HOST_BIND_IP:-127.0.0.1}:8003:8000"
    volumes:
      # Slice 4: rw so we can `docker start/stop/exec`, attach networks,
      # and `docker compose up -d --force-recreate` from inside the panel.
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Slice 4: rw so we can write <dir>/.env (RCON_PASSWORD) per decision 010.
      - ${SERVER_BASE_PATH}:${SERVER_BASE_PATH}:rw
