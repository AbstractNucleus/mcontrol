services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - internal

  caddy:
    image: slothcroissant/caddy-cloudflaredns:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
