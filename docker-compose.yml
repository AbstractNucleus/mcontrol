services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Discovery (decision 008) walks SERVER_BASE_PATH from inside the panel
      # container; bind-mount it at the same path so the env var works in both
      # contexts. Read-only this slice — slice 5's file UI will widen to rw.
      - ${SERVER_BASE_PATH}:${SERVER_BASE_PATH}:ro
