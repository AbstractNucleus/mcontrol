{% extends "base.html" %}

{% block title %}mcontrol — new server{% endblock %}

{% block main %}
{% include "_topnav.html" %}

<section class="new-server">
  <div>
    <p class="t-eyebrow">Servers</p>
    <h2 class="t-h1">Create a server</h2>
  </div>

  <form class="new-server__form" method="post" action="/servers/new">
    <label>
      <span class="t-eyebrow">Name</span>
      <input type="text"
             name="name"
             value="{{ form.name or '' }}"
             autocomplete="off"
             required>
      <small class="new-server__hint">3–32 chars; lowercase letters, digits, hyphens; must start with a letter.</small>
      {% if errors.name %}<small class="new-server__error">{{ errors.name }}</small>{% endif %}
    </label>

    <label>
      <span class="t-eyebrow">Memory budget (GB)</span>
      <input type="number"
             name="memory_budget_gb"
             min="2"
             value="{{ form.memory_budget_gb or '' }}"
             required>
      <small class="new-server__hint">Drives <code>mem_limit</code> and <code>-Xmx</code> (= budget − 2 GB).</small>
      {% if errors.memory_budget_gb %}<small class="new-server__error">{{ errors.memory_budget_gb }}</small>{% endif %}
    </label>

    <label>
      <span class="t-eyebrow">Port</span>
      <input type="number"
             name="port"
             min="1024"
             max="65535"
             value="{{ form.port or '' }}"
             required>
      <small class="new-server__hint">Host-side TCP port for Minecraft (1024–65535).</small>
      {% if errors.port %}<small class="new-server__error">{{ errors.port }}</small>{% endif %}
    </label>

    <label>
      <span class="t-eyebrow">Server jar filename</span>
      <input type="text"
             name="server_jar"
             value="{{ form.server_jar or '' }}"
             placeholder="paper-1.21.4.jar"
             autocomplete="off"
             required>
      <small class="new-server__hint">You'll upload the jar after scaffolding via the file browser.</small>
      {% if errors.server_jar %}<small class="new-server__error">{{ errors.server_jar }}</small>{% endif %}
    </label>

    <label>
      <span class="t-eyebrow">JVM extra args (optional)</span>
      <input type="text"
             name="jvm_extra_args"
             value="{{ form.jvm_extra_args or '' }}"
             placeholder="-XX:+UseG1GC ..."
             autocomplete="off">
      {% if errors.jvm_extra_args %}<small class="new-server__error">{{ errors.jvm_extra_args }}</small>{% endif %}
    </label>

    <div class="new-server__actions">
      <button type="submit" class="btn btn--primary">Create</button>
      <a class="btn btn--ghost" href="/">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
