<fieldset class="theme-toggle" data-theme-toggle aria-label="Theme">
  <legend class="visually-hidden">Theme</legend>

  <label class="theme-toggle__option" title="System">
    <input type="radio" name="theme" value="system">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="13" rx="2"></rect>
      <path d="M8 21h8M12 17v4"></path>
    </svg>
    <span class="visually-hidden">System</span>
  </label>

  <label class="theme-toggle__option" title="Light">
    <input type="radio" name="theme" value="light">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 3v2M12 19v2M5 12H3M21 12h-2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4"></path>
    </svg>
    <span class="visually-hidden">Light</span>
  </label>

  <label class="theme-toggle__option" title="Dark">
    <input type="radio" name="theme" value="dark">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
    </svg>
    <span class="visually-hidden">Dark</span>
  </label>
</fieldset>
