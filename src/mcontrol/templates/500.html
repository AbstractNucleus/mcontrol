{% extends "base.html" %}

{% block title %}Server error — mcontrol{% endblock %}

{% block main %}
<section class="error-page">
  <p class="error-page__code">500</p>
  <h1 class="error-page__title">Something went wrong</h1>
  <p class="error-page__body">
    The panel hit an internal error. Check the server logs on bserver for
    a traceback, then reload.
  </p>
  <div class="error-page__actions">
    <a class="btn btn--primary" href="/">Back to servers</a>
  </div>
</section>
{% endblock %}
