<section class="log-pane">
  <header class="log-pane__head">
    <p class="t-eyebrow">Logs</p>
    <span class="t-caption t-muted">live tail</span>
  </header>
  <pre id="log-stream"
       class="log-pane__stream"
       hx-ext="sse"
       sse-connect="/servers/{{ server.name }}/logs"
       sse-swap="message"
       hx-swap="beforeend"></pre>
</section>
